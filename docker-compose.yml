version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: cpdiagnose-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 8 && ollama pull codellama:7b && echo 'Model ready'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
